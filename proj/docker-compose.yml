version: '3'

services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla-node
    ports:
      - "9042:9042"  # CQL port
    volumes:
      - scylla-data:/var/lib/scylla
      - ./dataset:/dataset  # dataset directory
    command: --developer-mode=1 --smp 1

volumes:
  scylla-data:
